<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        .game-container {
            text-align: center;
        }
        canvas {
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Flappy Bird</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let frames = 0;
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        let gameState = 'start'; // start, playing, gameover

        // Bird object - OPTIMIZED PHYSICS
        const bird = {
            x: 50,
            y: 150,
            width: 32,
            height: 24,
            velocity: 0,
            gravity: 0.4,
            jump: -7,
            
            draw() {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(this.x + this.width/2, this.y + this.height/2, 
                           this.width/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x + this.width - 8, this.y + 6, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.x + this.width - 6, this.y + 6, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Beak
                ctx.fillStyle = '#FF6B35';
                ctx.beginPath();
                ctx.moveTo(this.x + this.width, this.y + 10);
                ctx.lineTo(this.x + this.width + 8, this.y + 14);
                ctx.lineTo(this.x + this.width, this.y + 18);
                ctx.fill();
            },
            
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                
                // Floor collision
                if (this.y + this.height > canvas.height) {
                    this.y = canvas.height - this.height;
                    gameOver();
                }
                
                // Ceiling collision
                if (this.y < 0) {
                    this.y = 0;
                    this.velocity = 0;
                }
            },
            
            jump() {
                this.velocity = this.jump;
            }
        };

        // Pipes - OPTIMIZED SETTINGS
        const pipes = [];
        const pipeWidth = 65;
        const pipeGap = 170;      // Wider gap for easier gameplay
        const pipeSpeed = 2.5;    // Slower speed

        function drawPipe(pipe) {
            ctx.fillStyle = '#2ECC71';
            
            // Top pipe
            ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
            ctx.strokeStyle = '#27AE60';
            ctx.lineWidth = 3;
            ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.top);
            
            // Bottom pipe
            ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
            ctx.strokeRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
        }

        function updatePipes() {
            if (frames % 120 === 0) {    // Spawn every 120 frames (~2 seconds)
                const minHeight = 60;
                const maxHeight = canvas.height - pipeGap - minHeight;
                const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
                
                pipes.push({
                    x: canvas.width,
                    top: topHeight,
                    bottom: canvas.height - pipeGap - topHeight,
                    passed: false
                });
            }

            for (let i = 0; i < pipes.length; i++) {
                let p = pipes[i];
                p.x -= pipeSpeed;
                
                // Collision detection
                if (bird.x + bird.width > p.x && 
                    bird.x < p.x + pipeWidth) {
                    if (bird.y < p.top || bird.y + bird.height > canvas.height - p.bottom) {
                        gameOver();
                    }
                }
                
                // Score when passing pipe
                if (!p.passed && bird.x > p.x + pipeWidth) {
                    score++;
                    p.passed = true;
                    highScore = Math.max(highScore, score);
                    localStorage.setItem('flappyHighScore', highScore);
                }
                
                // Remove off-screen pipes
                if (p.x + pipeWidth < 0) {
                    pipes.shift();
                    i--;
                }
            }
        }

        function drawScore() {
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            
            // Score
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.strokeText(score, canvas.width / 2, 50);
            ctx.fillText(score, canvas.width / 2, 50);
            
            // High score
            ctx.font = '18px Arial';
            ctx.strokeText('High: ' + highScore, canvas.width / 2, 30);
            ctx.fillText('High: ' + highScore, canvas.width / 2, 30);
        }

        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Flappy Bird', canvas.width / 2, canvas.height / 2 - 40);
            
            ctx.font = '20px Arial';
            ctx.fillText('Press SPACE or Click to jump', canvas.width / 2, canvas.height / 2 + 10);
            ctx.fillText('Avoid the green pipes!', canvas.width / 2, canvas.height / 2 + 45);
            
            // Auto-start after 3 seconds for easier onboarding
            if (frames > 180) {
                startGame();
            }
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#E74C3C';
            ctx.font = 'bold 42px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2 - 30);
            
            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillText('High Score: ' + highScore, canvas.width / 2, canvas.height / 2 + 55);
            
            ctx.font = '18px Arial';
            ctx.fillText('Press SPACE or Click to restart', canvas.width / 2, canvas.height / 2 + 100);
        }

        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(100 - (frames % 400), 80, 30, 0, Math.PI * 2);
            ctx.arc(140 - (frames % 400), 75, 35, 0, Math.PI * 2);
            ctx.arc(180 - (frames % 400), 80, 30, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(300 + (frames % 500) - 200, 150, 25, 0, Math.PI * 2);
            ctx.arc(340 + (frames % 500) - 200, 145, 30, 0, Math.PI * 2);
            ctx.fill();
            
            // Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 5);
        }

        function gameLoop() {
            if (gameState === 'playing') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                drawBackground();
                updatePipes();
                pipes.forEach(drawPipe);
                bird.update();
                bird.draw();
                drawScore();
                
                frames++;
            } else if (gameState === 'start') {
                drawBackground();
                bird.y = 150 + Math.sin(frames * 0.03) * 20; // Slower bobbing
                bird.draw();
                drawStartScreen();
                drawScore();
                frames++;
            } else if (gameState === 'gameover') {
                drawBackground();
                pipes.forEach(drawPipe);
                bird.draw();
                drawGameOver();
            }
            
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            frames = 0;
            pipes.length = 0;
            bird.y = 150;
            bird.velocity = 0;
        }

        function gameOver() {
            gameState = 'gameover';
        }

        function resetGame() {
            gameState = 'start';
            startGame();
        }

        // Input handling
        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space' && e.code !== ' ') return;
            
            switch (gameState) {
                case 'start':
                    startGame();
                    break;
                case 'playing':
                    bird.jump();
                    break;
                case 'gameover':
                    resetGame();
                    break;
            }
        }

        window.addEventListener('keydown', handleInput);
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e);
        });

        // Start the game loop
        gameLoop();
    </script>
</body>
</html>
