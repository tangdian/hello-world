<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        canvas {
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let state = {
            current: 'start',  // start, playing, gameover
            score: 0,
            highScore: parseInt(localStorage.getItem('flappyHighScore')) || 0,
            frames: 0
        };

        // Bird physics
        const bird = {
            x: 70,
            y: 300,
            width: 34,
            height: 26,
            velocity: 0,
            gravity: 0.25,   // Very light gravity
            jumpStrength: -6,
            
            draw() {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(this.x + this.width/2, this.y + this.height/2, 
                           this.width/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x + this.width - 8, this.y + 7, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.x + this.width - 6, this.y + 7, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Beak
                ctx.fillStyle = '#FF6B35';
                ctx.beginPath();
                ctx.moveTo(this.x + this.width, this.y + 11);
                ctx.lineTo(this.x + this.width + 7, this.y + 14);
                ctx.lineTo(this.x + this.width, this.y + 17);
                ctx.fill();
            },
            
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                
                // Floor collision - instant game over!
                if (this.y + this.height >= canvas.height - 20) {
                    state.current = 'gameover';
                }
            },
            
            jump() {
                this.velocity = this.jumpStrength;
            }
        };

        // Pipes array and settings
        let pipes = [];
        const PIPE_WIDTH = 58;
        const PIPE_GAP = 190;    // Even wider gap for easy mode
        const PIPE_SPEED = 1.3;   // Super slow speed
        const PIPE_SPAWN_RATE = 140;  // frames between spawns

        function spawnPipe() {
            const minPipeHeight = 60;
            const maxPipeHeight = canvas.height - PIPE_GAP - minPipeHeight - 25;
            const topHeight = Math.random() * (maxPipeHeight - minPipeHeight) + minPipeHeight;
            
            pipes.push({
                x: canvas.width,
                top: topHeight,
                bottom: canvas.height - PIPE_GAP - topHeight - 20,
                passed: false
            });
        }

        function updatePipes() {
            // Spawn new pipe
            if (state.frames % PIPE_SPAWN_RATE === 0) {
                spawnPipe();
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                const p = pipes[i];
                p.x -= PIPE_SPEED;

                // Collision detection with both pipes
                if (bird.x < p.x + PIPE_WIDTH && 
                    bird.x + bird.width > p.x) {
                    if (bird.y < p.top || bird.y + bird.height > canvas.height - p.bottom - 20) {
                        state.current = 'gameover';
                    }
                }

                // Score when passing
                if (!p.passed && bird.x > p.x + PIPE_WIDTH) {
                    state.score++;
                    p.passed = true;
                    if (state.score > state.highScore) {
                        state.highScore = state.score;
                        localStorage.setItem('flappyHighScore', state.highScore);
                    }
                }

                // Remove off-screen pipes
                if (p.x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function drawPipes() {
            ctx.fillStyle = '#2ECC71';
            ctx.strokeStyle = '#27AE60';
            ctx.lineWidth = 3;

            pipes.forEach(p => {
                // Top pipe
                ctx.fillRect(p.x, 0, PIPE_WIDTH, p.top);
                ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.top);

                // Bottom pipe
                ctx.fillRect(p.x, canvas.height - p.bottom, PIPE_WIDTH, p.bottom);
                ctx.strokeRect(p.x, canvas.height - p.bottom, PIPE_WIDTH, p.bottom);
            });
        }

        function drawBackground() {
            // Sky gradient
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#87CEEB');
            grad.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(100, 80, 30, 0, Math.PI * 2);
            ctx.arc(140, 75, 35, 0, Math.PI * 2);
            ctx.fill();

            // Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 5);
        }

        function drawScore() {
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.strokeText(state.score, canvas.width / 2, 50);
            ctx.fillText(state.score, canvas.width / 2, 50);

            ctx.font = '18px Arial';
            ctx.strokeText('High: ' + state.highScore, canvas.width / 2, 30);
            ctx.fillText('High: ' + state.highScore, canvas.width / 2, 30);
        }

        function drawStartScreen() {
            drawBackground();
            bird.y = 250;
            bird.draw();

            // Overlay with instructions
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'white';
            ctx.font = 'bold 38px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('FLAPPY BIRD', canvas.width / 2, canvas.height / 2 - 50);

            ctx.font = '22px Arial';
            ctx.fillText('Press SPACE or Click to start', canvas.width / 2, canvas.height / 2 + 10);
        }

        function drawGameOver() {
            drawBackground();
            drawPipes();
            bird.draw();

            // Overlay with results
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#E74C3C';
            ctx.font = 'bold 45px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);

            ctx.fillStyle = 'white';
            ctx.font = '26px Arial';
            ctx.fillText(`Score: ${state.score}`, canvas.width / 2, canvas.height / 2 + 15);
            ctx.fillText(`Best: ${state.highScore}`, canvas.width / 2, canvas.height / 2 + 50);

            ctx.font = '19px Arial';
            ctx.fillText('Press SPACE or Click to restart', canvas.width / 2, canvas.height / 2 + 95);
        }

        function gameLoop() {
            if (state.current === 'playing') {
                drawBackground();
                updatePipes();
                drawPipes();
                bird.update();
                bird.draw();
                drawScore();
                state.frames++;
            } else if (state.current === 'start') {
                drawStartScreen();
            } else if (state.current === 'gameover') {
                drawGameOver();
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            state.current = 'playing';
            state.score = 0;
            state.frames = 0;
            pipes = [];
            bird.y = 250;
            bird.velocity = 0;
        }

        function resetGame() {
            state.current = 'start';
            startGame();
        }

        // Input handler
        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space' && e.code !== ' ') return;

            switch (state.current) {
                case 'start':
                    startGame();
                    break;
                case 'playing':
                    bird.jump();
                    break;
                case 'gameover':
                    resetGame();
                    break;
            }
        }

        // Event listeners
        window.addEventListener('keydown', handleInput);
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e);
        });

        // Start!
        gameLoop();
    </script>
</body>
</html>
